<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" role="img" aria-labelledby="title desc">
  <title id="title">筑基新手接入流程</title>
  <desc id="desc">新用户从注册筑基到在 Codex 使用插件能力的流程。</desc>
  <rect width="1120" height="430" fill="#ffffff"/>
  <text x="56" y="64" font-family="Arial, 'PingFang SC', sans-serif" font-size="31" font-weight="700" fill="#0f172a">筑基新手接入流程</text>
  <text x="56" y="100" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#475569">一句“看看我能用哪些功能”，先检查，再分流；没接入筑基就不继续筑基专属动作。</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>

  <g font-family="Arial, 'PingFang SC', sans-serif">
    <rect x="70" y="160" width="150" height="92" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="98" y="199" font-size="19" font-weight="700" fill="#1e3a8a">注册登录</text>
    <text x="100" y="226" font-size="14" fill="#1e40af">iaigc.fun</text>

    <rect x="275" y="160" width="150" height="92" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="288" y="199" font-size="19" font-weight="700" fill="#14532d">创建 API Key</text>
    <text x="292" y="226" font-size="14" fill="#166534">sub.iaigc.fun/keys</text>

    <rect x="480" y="160" width="160" height="92" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="506" y="199" font-size="19" font-weight="700" fill="#78350f">导入 Codex</text>
    <text x="505" y="226" font-size="14" fill="#92400e">CC Switch / 手动</text>

    <rect x="700" y="160" width="150" height="92" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="728" y="199" font-size="19" font-weight="700" fill="#075985">本机检查</text>
    <text x="720" y="226" font-size="14" fill="#0369a1">zhuji doctor</text>

    <rect x="905" y="160" width="150" height="92" rx="8" fill="#fae8ff" stroke="#c026d3" stroke-width="2"/>
    <text x="933" y="199" font-size="19" font-weight="700" fill="#86198f">开始使用</text>
    <text x="927" y="226" font-size="14" fill="#a21caf">生图 / 记忆 / 飞书</text>

    <line x1="220" y1="206" x2="263" y2="206" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="425" y1="206" x2="468" y2="206" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="640" y1="206" x2="688" y2="206" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="850" y1="206" x2="893" y2="206" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="700" y="302" width="355" height="70" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="728" y="331" font-size="17" font-weight="700" fill="#991b1b">如果不是筑基 Provider</text>
    <text x="728" y="356" font-size="14" fill="#991b1b">停止筑基专属动作，回到注册、API Key 和 Provider 配置。</text>
    <line x1="775" y1="252" x2="775" y2="290" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  </g>
</svg>
