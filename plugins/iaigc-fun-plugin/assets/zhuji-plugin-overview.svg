<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">筑基插件能力总览</title>
  <desc id="desc">筑基主站、API令牌、Codex Provider 与插件能力之间的关系。</desc>
  <rect width="1120" height="520" fill="#f8fafc"/>
  <text x="56" y="66" font-family="Arial, 'PingFang SC', sans-serif" font-size="32" font-weight="700" fill="#0f172a">筑基插件能力总览</text>
  <text x="56" y="104" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#475569">从筑基主站注册、创建令牌，把 Codex Provider 接到筑基，再使用生图、插件、记忆和飞书入口。</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>

  <g font-family="Arial, 'PingFang SC', sans-serif">
    <rect x="70" y="160" width="190" height="116" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="100" y="205" font-size="22" font-weight="700" fill="#1e3a8a">筑基主站</text>
    <text x="100" y="236" font-size="15" fill="#1e40af">iaigc.fun</text>
    <text x="100" y="258" font-size="15" fill="#1e40af">套餐 / 灵石 / 日志</text>

    <rect x="340" y="160" width="190" height="116" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="370" y="205" font-size="22" font-weight="700" fill="#14532d">控制台令牌</text>
    <text x="370" y="236" font-size="15" fill="#166534">API Key</text>
    <text x="370" y="258" font-size="15" fill="#166534">CC Switch 导入</text>

    <rect x="610" y="160" width="210" height="116" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="640" y="205" font-size="22" font-weight="700" fill="#78350f">Codex Provider</text>
    <text x="640" y="236" font-size="15" fill="#92400e">api.iaigc.fun/v1</text>
    <text x="640" y="258" font-size="15" fill="#92400e">fast / 长上下文</text>

    <line x1="260" y1="218" x2="328" y2="218" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="530" y1="218" x2="598" y2="218" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="890" y="122" width="170" height="76" rx="8" fill="#fae8ff" stroke="#c026d3" stroke-width="2"/>
    <text x="925" y="168" font-size="20" font-weight="700" fill="#86198f">AI 生图</text>

    <rect x="890" y="220" width="170" height="76" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="918" y="266" font-size="20" font-weight="700" fill="#991b1b">开启插件</text>

    <rect x="610" y="340" width="170" height="76" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="645" y="386" font-size="20" font-weight="700" fill="#075985">长期记忆</text>

    <rect x="820" y="340" width="170" height="76" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="855" y="386" font-size="20" font-weight="700" fill="#5b21b6">飞书入口</text>

    <line x1="820" y1="196" x2="878" y2="165" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="820" y1="240" x2="878" y2="254" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="715" y1="276" x2="700" y2="328" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="760" y1="276" x2="865" y2="330" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

    <text x="70" y="456" font-size="15" fill="#475569">原则：筑基专属动作必须确认 Provider 属于 iaigc.fun；否则停止动作并引导注册、创建令牌、重新导入配置。</text>
  </g>
</svg>
